name: Create Production Builds

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_android:
    name: Build Android (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🚀 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🛠 Build Android production bundle
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build_ios:
    name: Build iOS (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🚀 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🛠 Build iOS production bundle
        run: eas build --platform ios --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  notify:
    name: 🔔 Notification
    needs: [build_android, build_ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build_android.result }}" = "success" ] && [ "${{ needs.build_ios.result }}" = "success" ]; then
            echo "✅ Both Android and iOS production builds triggered successfully!"
          elif [ "${{ needs.build_android.result }}" = "success" ]; then
            echo "⚠️ Android build succeeded, but iOS build failed or was skipped."
          elif [ "${{ needs.build_ios.result }}" = "success" ]; then
            echo "⚠️ iOS build succeeded, but Android build failed or was skipped."
          else
            echo "❌ Both builds failed or were skipped."
          fi

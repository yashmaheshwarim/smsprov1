[build]
  command = "npm run build"
  publish = "dist"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/whatsapp/send"
  to = "/.netlify/functions/whatsapp-message"
  status = 200

[[redirects]]
  from = "/api/whatsapp/webhook"
  to = "/.netlify/functions/whatsapp-webhook"
  status = 200

# Proxy OpenWA API calls to the OpenWA server
# This resolves Mixed Content: HTTPS site → Netlify proxy → HTTP OpenWA server
[[redirects]]
  from = "/api/openwa/*"
  to = "http://16.16.142.42:2785/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[dev]
  framework = "vite"
  targetPort = 8080
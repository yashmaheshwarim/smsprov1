[build]
  command = "npm run build"
  publish = "dist"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/whatsapp/send"
  to = "/.netlify/functions/whatsapp-message"
  status = 200

[[redirects]]
  from = "/api/whatsapp/webhook"
  to = "/.netlify/functions/whatsapp-webhook"
  status = 200

# Proxy OpenWA API calls through a configurable Netlify function
# Target URL is set via OPENWA_PROXY_TARGET env var in Netlify dashboard
# This resolves Mixed Content: HTTPS site → Netlify function → ngrok tunnel → local OpenWA server
[[redirects]]
  from = "/api/openwa/*"
  to = "/.netlify/functions/openwa-proxy/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[dev]
  framework = "vite"
  targetPort = 8080
# Netlify build configuration
# This file mirrors settings configured in the Netlify app UI.
# When both exist, file-based settings take precedence over UI settings.

[build]
  command = "npm run build"
  publish = "dist"

# Note: using npm instead of bun because bun.lock was removed to fix Railway builds.
# Netlify auto-detects npm from package-lock.json and runs npm install before build.

# --- Environment variables ---
# Required: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# These must be set in the Netlify UI (Site settings > Environment variables)
# because they contain secrets that shouldn't be in the repo.
#
# Non-sensitive vars are set here in netlify.toml:

[context.production.environment]
  VITE_WHATSAPP_SERVER_URL = "https://smsprov1-production.up.railway.app"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback — all routes served by index.html
# Note: public/_redirects also has this same rule as a fallback.
# Both can coexist; Netlify merges them.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
